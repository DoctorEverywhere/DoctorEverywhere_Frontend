<div class="card border h-100">
  <div class="card-header bg-white d-flex align-items-center justify-content-between border-bottom py-3">
    <h2 class="h6 fw-semibold mb-0">Today's Schedule</h2>
    <a routerLink="/doctor/appointments" class="btn btn-link btn-sm text-primary p-0 text-decoration-none">View all</a>
  </div>

  @if (loading) {
    <div class="text-center text-muted py-4 small">Loading…</div>
  } @else if (appointments.length === 0) {
    <div class="text-center text-muted py-4 small">No appointments today.</div>
  } @else {
    <ul class="list-group list-group-flush">
      @for (a of appointments; track a.id) {
        <li class="list-group-item d-flex align-items-center gap-3 py-3">
          <div class="patient-avatar rounded-circle bg-primary-subtle d-flex align-items-center justify-content-center flex-shrink-0">
            <span class="small fw-semibold text-primary text-uppercase">{{ initials(a.patientName ?? '?') }}</span>
          </div>
          <div class="flex-grow-1 min-w-0">
            <div class="small fw-semibold text-dark text-truncate">{{ a.patientName }}</div>
          </div>
          <span class="badge rounded-pill bg-success-subtle text-success">{{ a.time }}</span>
        </li>
      }
    </ul>
  }
</div>
