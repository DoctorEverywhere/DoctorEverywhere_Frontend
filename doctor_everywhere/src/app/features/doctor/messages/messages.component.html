<div class="d-flex flex-column gap-4">

  <div>
    <h1 class="h4 fw-semibold text-dark mb-0">Messages</h1>
    <p class="text-muted small mb-0">Communicate with your patients.</p>
  </div>

  <app-message-compose
    [appointments]="appointments"
    [sending]="sending"
    (messageSent)="onSend($event)"
  />

  <app-message-list [messages]="messages" [loading]="loading" />

</div>
