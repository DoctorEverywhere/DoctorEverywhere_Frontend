<div class="d-flex flex-column align-items-end w-100 mt-4">
  
  @if (errorMessage) {
    <div class="alert alert-danger py-2 mb-3 text-sm">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      {{ errorMessage }}
    </div>
  }

  <button 
    class="btn btn-danger" 
    (click)="onDeleteClick()" 
    [disabled]="isDeleting">
    
    @if (isDeleting) {
      <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      Deleting...
    } @else {
      <i class="bi bi-trash3 me-2"></i> Delete Profile
    }
    
  </button>
</div>
