<div class="d-flex flex-column gap-4">

  <div>
    <h1 class="h4 fw-semibold text-dark mb-0">Appointment Requests</h1>
    <p class="text-muted small mb-0">Review and respond to patient booking requests.</p>
  </div>

  <ul class="nav nav-tabs border-bottom">
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'pending'" (click)="activeTab = 'pending'">
        Pending
        <span class="badge rounded-pill" [class.bg-warning]="activeTab === 'pending'" [class.bg-secondary]="activeTab !== 'pending'">{{ pending.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'accepted'" (click)="activeTab = 'accepted'">
        Accepted
        <span class="badge rounded-pill bg-secondary">{{ accepted.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'rejected'" (click)="activeTab = 'rejected'">
        Rejected
        <span class="badge rounded-pill bg-secondary">{{ rejected.length }}</span>
      </button>
    </li>
  </ul>

  <app-request-list
    [requests]="activeList"
    [loading]="loading"
    [showActions]="activeTab === 'pending'"
    (accepted)="accept($event)"
    (rejected)="reject($event)"
  />

</div>
