<div class="d-flex flex-column gap-4">

  <div>
    <h1 class="h4 fw-semibold text-dark mb-0">Appointments</h1>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs border-bottom">
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'upcoming'" (click)="activeTab = 'upcoming'">
        Upcoming <span class="badge rounded-pill bg-secondary">{{ upcoming.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'past'" (click)="activeTab = 'past'">
        Past <span class="badge rounded-pill bg-secondary">{{ past.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'cancelled'" (click)="activeTab = 'cancelled'">
        Cancelled <span class="badge rounded-pill bg-secondary">{{ cancelled.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link d-flex align-items-center gap-2" [class.active]="activeTab === 'slots'" (click)="activeTab = 'slots'">
        <i class="bi bi-calendar-week"></i> Weekly Slots
      </button>
    </li>
  </ul>

  @if (activeTab !== 'slots') {
    <app-appointment-list [appointments]="activeList" [loading]="loading" [label]="activeTab" />
  }

  @if (activeTab === 'slots') {
    <app-weekly-schedule />
  }

</div>
