<div class="appts-page">
  <div class="page-header">
    <h1 class="page-title">My Appointments</h1>
  </div>

  <div class="tabs">
    <button class="tab" [class.active]="activeTab === 'upcoming'" (click)="activeTab = 'upcoming'">
      Upcoming <span class="tab-count">{{ upcoming.length }}</span>
    </button>
    <button class="tab" [class.active]="activeTab === 'past'" (click)="activeTab = 'past'">
      Past / Cancelled <span class="tab-count">{{ past.length }}</span>
    </button>
  </div>

  <div *ngIf="loading" class="empty-state">Loading…</div>

  <ng-container *ngIf="!loading">
    <div class="appt-list">
      <div
        class="appt-card"
        *ngFor="let a of (activeTab === 'upcoming' ? upcoming : past)"
      >
        <div class="appt-left">
          <div class="appt-date-block">
            <span class="appt-day">{{ a.date.split('-')[2] }}</span>
            <span class="appt-month">{{ formatDate(a.date).split(' ')[2] }}</span>
          </div>
        </div>
        <div class="appt-body">
          <div class="appt-top">
            <span class="appt-doctor">{{ a.doctorName }}</span>
            <span class="status-badge" [ngClass]="statusClass(a.status)">{{ a.status }}</span>
          </div>
          <span class="appt-spec">{{ a.doctorSpecialty }}</span>
          <span class="appt-time">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            {{ formatDate(a.date) }} at {{ a.time }}
          </span>
          <span class="appt-notes" *ngIf="a.notes">📝 {{ a.notes }}</span>
        </div>
        <div class="appt-actions" *ngIf="activeTab === 'upcoming' && a.status !== 'cancelled'">
          <button class="btn-cancel" (click)="cancel(a.id)">Cancel</button>
        </div>
      </div>

      <div *ngIf="(activeTab === 'upcoming' ? upcoming : past).length === 0" class="empty-state">
        No {{ activeTab }} appointments.
      </div>
    </div>
  </ng-container>
</div>
