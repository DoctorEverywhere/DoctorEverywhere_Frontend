<div class="d-flex vh-100 overflow-hidden">
  <!-- ──*ngIf="user$ | async as user" removed above, is for the auth── -->

  <!-- ── Sidebar ── -->
  <aside class="sidebar d-flex flex-column bg-white border-end">

    <div class="sidebar-brand d-flex align-items-center gap-2 px-3 py-3 border-bottom">
     <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#185FA5"/>
  <text x="16" y="22" font-family="Arial" font-weight="bold" font-size="16" fill="white" text-anchor="middle">DE</text>
</svg>
      <span class="fw-semibold small text-dark">DoctorEverywhere</span>
    </div>

    <nav class="nav flex-column gap-1 px-2 py-3 flex-grow-1">
      <a class="nav-link d-flex align-items-center gap-2 rounded-2 px-3 py-2"
         routerLink="/patient/dashboard" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Home
      </a>
      <a class="nav-link d-flex align-items-center gap-2 rounded-2 px-3 py-2"
         routerLink="/patient/search" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Find Doctors
      </a>
      <a class="nav-link d-flex align-items-center gap-2 rounded-2 px-3 py-2"
         routerLink="/patient/appointments" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Appointments
      </a>
      <a class="nav-link d-flex align-items-center gap-2 rounded-2 px-3 py-2 position-relative"
         routerLink="/patient/messages" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
        <span class="badge rounded-pill bg-danger ms-auto" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </a>
    </nav>

    <!-- ──  <div class="sidebar-user">
      <div class="avatar">{{ initials(user.firstName, user.lastName) }}</div>
      <div class="user-meta">
        <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
        <span class="user-role">Patient</span>
      </div>
      <button class="btn-logout" (click)="logout()" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>── -->
    <div class="d-flex align-items-center gap-2 px-3 py-3 border-top">
      <div class="user-avatar rounded-circle bg-primary-subtle d-flex align-items-center justify-content-center flex-shrink-0">
        <span class="small fw-semibold text-primary">JS</span>
      </div>
      <div class="flex-grow-1 overflow-hidden">
        <div class="small fw-medium text-dark text-truncate">Jane Smith</div>
        <div class="text-muted" style="font-size:0.75rem">Patient</div>
      </div>
      <button class="btn btn-sm btn-link text-muted p-1" (click)="logout()" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

  </aside>

  <!-- ── Page content ── -->
  <main class="flex-grow-1 overflow-y-auto bg-light p-4">
    <router-outlet />
  </main>

</div>
