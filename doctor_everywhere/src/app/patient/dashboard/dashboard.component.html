        <path d="M8 22V10l8 6 8-6v12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <span>DoctorEverywhere</span>

    <nav class="nav">
        <a class="nav-link" routerLink="/patient/dashboard" routerLinkActive="active">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
  Home
</a>
      <a class="nav-link" routerLink="/patient/search" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Find Doctors
      </a>
      <a class="nav-link" routerLink="/patient/appointments" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Appointments
      </a>
      <a class="nav-link" routerLink="/patient/messages" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
        <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </a>
    </nav>
